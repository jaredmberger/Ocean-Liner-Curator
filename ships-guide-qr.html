<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ships Guide QR Poster</title>

<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;600&family=Libre+Baskerville&display=swap" rel="stylesheet">

<style>
body{
background:#0a1110;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.poster{
width:520px;
height:760px;
background:#0a1110;
border:1px solid #bfa46a33;
box-shadow:0 0 120px #bfa46a22 inset;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
font-family:"Spectral", serif;
}

.star{
color:#bfa46a;
font-size:28px;
margin-bottom:18px;
}

.title{
color:#bfa46a;
font-size:46px;
letter-spacing:6px;
}

.subtitle{
color:#b6ae9c;
font-family:"Libre Baskerville", serif;
font-size:16px;
margin-top:10px;
margin-bottom:40px;
letter-spacing:1px;
}

.qr{
background:white;
padding:18px;
margin-bottom:30px;
}

.domain{
color:#bfa46a;
font-size:26px;
letter-spacing:3px;
margin-bottom:18px;
}

.cta{
color:#b6ae9c;
font-size:14px;
letter-spacing:2px;
}

</style>
</head>

<body>

<div class="poster">

<div class="star">★</div>

<div class="title">SHIPS GUIDE</div>

<div class="subtitle">Curated Ocean Liner References</div>

<div class="qr">
<img src="ships-guide-qr.png" width="220">
</div>

<div class="domain">ships.guide</div>

<div class="cta">Explore the Archive →</div>

</div>

</body>
</html>
